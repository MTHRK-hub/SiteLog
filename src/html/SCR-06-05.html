<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - メッセージ設定</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-06-05.css" />
</head>
<body class="message-setting-page">
  <div class="app">
    <div class="card">
      <form id="form-message" class="form-grid" novalidate>
        <label>メッセージ<textarea id="input-message" name="message" rows="6"></textarea></label>
        <p id="load-error" class="error-msg" role="alert"></p>
        <p id="form-error" class="error-msg" role="alert"></p>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btn-update">更新</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel">キャンセル</button>
        </div>
      </form>
    </div>
  </div>

  <div id="confirm-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg">更新しますか？</p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-primary" id="btn-confirm-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-confirm-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-06-05.js"></script>
</body>
</html>
