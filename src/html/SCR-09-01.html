<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - お店一覧</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-09-01.css" />
</head>
<body class="shop-list-page">
  <div class="app">
    <div class="card">
      <div class="shop-controls">
        <select id="location-filter" class="shop-select"></select>
      </div>
      <div class="shop-controls" id="category-filter-row" hidden>
        <select id="category-filter" class="shop-select"></select>
      </div>
      <p class="info-text" id="shop-load-status"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>店名</th>
              <th>場所</th>
              <th>カテゴリ</th>
            </tr>
          </thead>
          <tbody id="shop-list-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-09-01.js"></script>
</body>
</html>
