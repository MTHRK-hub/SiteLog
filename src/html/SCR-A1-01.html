<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - パスワード変更</title>
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/SCR-00-01.css" />
  <link rel="stylesheet" href="../css/SCR-A1-01.css" />
</head>
<body class="password-change-page">
  <div class="app">
    <div class="card">
      <!-- フェーズ1: 現在のパスワード確認 -->
      <div id="phase-verify">
        <form id="form-verify" class="form-grid" novalidate>
          <label>現在のパスワード<input id="input-current-pw" name="currentPassword" type="password" required autocomplete="current-password" /></label>
          <p id="verify-error" class="error-msg" role="alert"></p>
          <div class="form-actions-single">
            <button type="submit" class="btn btn-primary" id="btn-verify">送信</button>
          </div>
        </form>
      </div>

      <!-- フェーズ2: 新しいパスワード入力（フェーズ1成功後に表示） -->
      <div id="phase-change" hidden>
        <form id="form-change" class="form-grid" novalidate>
          <label>新しいパスワード<input id="input-new-pw" name="newPassword" type="password" required autocomplete="new-password" /></label>
          <label>新しいパスワード（確認用）<input id="input-new-pw-confirm" name="newPasswordConfirm" type="password" required autocomplete="new-password" /></label>
          <p id="change-error" class="error-msg" role="alert"></p>
          <div class="form-actions-single">
            <button type="submit" class="btn btn-primary" id="btn-change">変更</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 確認ダイアログ -->
  <div id="confirm-dialog" class="dialog-overlay" hidden>
    <div class="dialog-box">
      <p class="dialog-msg">パスワードを変更しますか？</p>
      <div class="dialog-actions">
        <button type="button" class="btn btn-primary" id="btn-confirm-ok">はい</button>
        <button type="button" class="btn btn-secondary" id="btn-confirm-cancel">キャンセル</button>
      </div>
    </div>
  </div>
  <div class="globe-footer">
    <div class="globe-stage" role="img" aria-label="地球儀">
      <div class="globe-whirl">
        <svg viewBox="0 0 200 200" aria-hidden="true">
          <g class="globe-ring-a">
            <circle cx="100" cy="100" r="96" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="170 432" stroke-linecap="round" opacity="0.9"/>
            <circle cx="100" cy="100" r="96" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="40 562" stroke-dashoffset="-220" stroke-linecap="round" opacity="0.55"/>
          </g>
          <g class="globe-ring-b">
            <circle cx="100" cy="100" r="86" fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="2 6" opacity="0.7"/>
            <circle cx="100" cy="100" r="86" fill="none" stroke="currentColor" stroke-width="1.25" stroke-dasharray="60 480" stroke-linecap="round" opacity="0.9"/>
          </g>
          <g class="globe-ring-c">
            <circle cx="100" cy="100" r="74" fill="none" stroke="currentColor" stroke-width="0.75" stroke-dasharray="120 340" stroke-linecap="round" opacity="0.8"/>
          </g>
          <g class="globe-spark">
            <circle cx="100" cy="18" r="1.6" fill="currentColor"/>
            <circle cx="182" cy="100" r="1.1" fill="currentColor" opacity="0.7"/>
            <circle cx="100" cy="182" r="0.9" fill="currentColor" opacity="0.5"/>
          </g>
        </svg>
      </div>
      <div class="globe-canvas-wrap">
        <canvas id="globe-canvas" width="240" height="240"></canvas>
      </div>
    </div>
  </div>

  <script>
    window.SITELOG_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzslsgfnlEFzyDA6W4ysgPJYz8w2PDOG_bCZh5qCy7lQvnfyYa9rR-kkLZGGXENb81D/exec";
  </script>
  <script src="../js/common.js"></script>
  <script src="../js/SCR-A1-01.js"></script>
  <script src="../js/globe.js"></script>
</body>
</html>
