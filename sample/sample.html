<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e3583;
      --surface: #476575;
      --surface-raised: #1f4c5b;
      --text: #fbfbfb;
      --text-muted: #ffffff;
      --accent: #3d9eff;
      --accent-hover: #5aadff;
      --danger: #f07178;
      --radius: 12px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      --touch-min: 44px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e2840 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
    }

    .screen {
      display: none;
    }

    .screen.is-active {
      display: block;
    }

    .card {
      background: var(--surface);
      border-radius: calc(var(--radius) + 6px);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @media (min-width: 480px) {
      .card {
        padding: 24px 28px;
      }
    }

    /* 共通ヘッダー */
    .top-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .top-bar-title {
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 600;
      margin: 0;
      text-align: center;
      line-height: 1.3;
    }

    .top-bar-left {
      justify-self: start;
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
    }

    .top-bar-right {
      justify-self: end;
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
    }

    .top-bar-spacer {
      width: 1px;
      height: 1px;
      visibility: hidden;
    }

    .screen--menu .top-bar-left .top-bar-spacer {
      visibility: visible;
    }

    .screen--menu .btn-menu-back {
      display: none;
    }

    /* SCR-01 ログイン */
    .login-wrap {
      max-width: 400px;
      margin: 8vh auto 0;
    }

    .login-wrap h1 {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 24px;
      letter-spacing: 0.04em;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      min-height: var(--touch-min);
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .login-actions {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }

    .login-actions .btn {
      min-height: var(--touch-min);
    }

    .btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0c10;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface-raised);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 12px;
      font-size: 0.875rem;
      min-height: var(--touch-min);
    }

    .btn-ghost:hover {
      color: var(--text);
    }

    .btn-detail {
      background: var(--surface-raised);
      color: var(--accent);
      padding: 8px 14px;
      font-size: 0.85rem;
      min-height: 40px;
    }

    .btn-detail:hover {
      background: rgba(61, 158, 255, 0.15);
    }

    .btn-menu-back {
      background: var(--surface-raised);
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.8rem;
      max-width: 42vw;
      line-height: 1.25;
      text-align: left;
    }

    .btn-menu-back:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .error-msg {
      margin-top: 14px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--danger);
      min-height: 1.4em;
    }

    /* SCR-02 メニュー */
    .menu-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }

    .menu-link {
      display: block;
      padding: 18px 20px;
      border-radius: var(--radius);
      background: var(--bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      min-height: var(--touch-min);
      line-height: 1.3;
    }

    .menu-link:hover {
      border-color: rgba(61, 158, 255, 0.35);
      color: var(--accent);
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg);
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: middle;
    }

    tbody tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .detail-rows {
      display: grid;
      gap: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      align-items: baseline;
      font-size: 0.92rem;
    }

    .detail-row dt {
      margin: 0;
      color: var(--text-muted);
      font-weight: 500;
    }

    .detail-row dd {
      margin: 0;
      word-break: break-word;
    }

    @media (max-width: 520px) {
      .detail-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    .friend-load-err {
      color: var(--danger);
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    .csv-toolbar {
      margin-bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .csv-toolbar .btn {
      font-size: 0.875rem;
      min-height: 40px;
    }

    .csv-toolbar label {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- SCR-01 -->
    <section id="screen-login" class="screen screen--login" aria-hidden="true">
      <div class="card login-wrap">
        <h1>現場管理システム</h1>
        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-id">ID</label>
            <input id="login-id" name="id" type="text" autocomplete="username" />
          </div>
          <div class="field">
            <label for="login-password">パスワード</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" />
          </div>
          <div class="login-actions">
            <button type="submit" class="btn btn-primary">ログイン</button>
            <button type="button" id="btn-close-login" class="btn btn-secondary">閉じる</button>
          </div>
        </form>
        <p id="login-error" class="error-msg" role="alert"></p>
      </div>
    </section>

    <!-- SCR-02 メニュー -->
    <section id="screen-menu" class="screen screen--menu" aria-hidden="true">
      <div class="card">
        <header class="top-bar">
          <div class="top-bar-left">
            <span class="top-bar-spacer" aria-hidden="true"></span>
          </div>
          <h1 class="top-bar-title">現場管理システム</h1>
          <div class="top-bar-right">
            <button type="button" class="btn btn-ghost" data-action="logout">ログアウト</button>
          </div>
        </header>
        <nav class="menu-links">
          <button type="button" class="menu-link" id="link-friend-list">友達一覧</button>
          <button type="button" class="menu-link" id="link-memo-list">現場メモ</button>
        </nav>
      </div>
    </section>

    <!-- SCR-03-1 友達一覧 -->
    <section id="screen-friend-list" class="screen" aria-hidden="true">
      <div class="card">
        <header class="top-bar">
          <div class="top-bar-left">
            <button type="button" class="btn btn-menu-back" data-action="menu">メニューへ戻る</button>
          </div>
          <h1 class="top-bar-title">友達一覧</h1>
          <div class="top-bar-right">
            <button type="button" class="btn btn-ghost" data-action="logout">ログアウト</button>
          </div>
        </header>
        <p id="friend-load-error" class="friend-load-err" role="status" hidden></p>
        <div class="csv-toolbar">
          <label class="btn btn-secondary">
            CSVファイルを指定
            <input type="file" id="csv-file-input" accept=".csv,text/csv,text/plain" hidden />
          </label>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>名前</th>
                <th>LINE名</th>
                <th>年齢</th>
                <th>性別</th>
                <th>職業</th>
                <th>詳細</th>
              </tr>
            </thead>
            <tbody id="friend-list-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- SCR-03-2 友達詳細 -->
    <section id="screen-friend-detail" class="screen" aria-hidden="true">
      <div class="card">
        <header class="top-bar">
          <div class="top-bar-left">
            <button type="button" class="btn btn-menu-back" data-action="menu">メニューへ戻る</button>
          </div>
          <h1 class="top-bar-title">友達詳細</h1>
          <div class="top-bar-right">
            <button type="button" class="btn btn-ghost" data-action="logout">ログアウト</button>
          </div>
        </header>
        <dl class="detail-rows" id="friend-detail-content"></dl>
      </div>
    </section>

    <!-- SCR-04-1 現場メモ一覧 -->
    <section id="screen-memo-list" class="screen" aria-hidden="true">
      <div class="card">
        <header class="top-bar">
          <div class="top-bar-left">
            <button type="button" class="btn btn-menu-back" data-action="menu">メニューへ戻る</button>
          </div>
          <h1 class="top-bar-title">現場メモ</h1>
          <div class="top-bar-right">
            <button type="button" class="btn btn-ghost" data-action="logout">ログアウト</button>
          </div>
        </header>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>項目</th>
                <th>詳細</th>
              </tr>
            </thead>
            <tbody id="memo-list-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <!-- file:// で開いたとき fetch が使えないため、friends.csv と同内容を同梱（fetch 失敗時のフォールバック） -->
  <script type="text/plain" id="embedded-friends-csv">
id,name,lineName,age,gender,occupation,metDate,metPlace,info,futurePlan
1,山田 太郎,taro_y,30,男,エンジニア,2024-06-01,渋谷,大学の同級生。フットサル仲間。,来月ランチ予定
2,佐藤 花子,hanako_s,27,女,デザイナー,2024-08-15,新宿,交流会で知り合い。趣味が近い。,合同イベント参加予定
3,鈴木 一郎,ichi_szk,35,男,営業,2025-01-20,横浜,クライアント経由の紹介。,四半期レビュー後に連絡
  </script>

  <script>
    const AUTH = { id: "user", password: "user" };

    const FALLBACK_CSV =
      "id,name,lineName,age,gender,occupation,metDate,metPlace,info,futurePlan\n" +
      "1,山田 太郎,taro_y,30,男,エンジニア,2024-06-01,渋谷,大学の同級生。,来月ランチ予定\n" +
      "2,佐藤 花子,hanako_s,27,女,デザイナー,2024-08-15,新宿,交流会で知り合い。,合同イベント参加予定\n";

    const memos = [
      { id: 1, date: "2026-04-01", category: "つくる", detail: "週次の振り返りメモ" },
      { id: 2, date: "2026-04-03", category: "1:1", detail: "キャリアの相談" },
      { id: 3, date: "2026-04-05", category: "商談", detail: "見積もり提出済み" },
      { id: 4, date: "2026-04-08", category: "つくる", detail: "プロトタイプレビュー" }
    ];

    let isLoggedIn = false;
    let currentScreen = "login";
    let selectedFriend = null;
    let friends = [];

    const screens = {
      login: document.getElementById("screen-login"),
      menu: document.getElementById("screen-menu"),
      friendList: document.getElementById("screen-friend-list"),
      friendDetail: document.getElementById("screen-friend-detail"),
      memoList: document.getElementById("screen-memo-list")
    };

    const loginForm = document.getElementById("login-form");
    const loginError = document.getElementById("login-error");
    const friendListBody = document.getElementById("friend-list-body");
    const friendDetailContent = document.getElementById("friend-detail-content");
    const memoListBody = document.getElementById("memo-list-body");
    const friendLoadError = document.getElementById("friend-load-error");

    function parseCSVRow(line) {
      const out = [];
      let cur = "";
      let inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          inQ = !inQ;
          continue;
        }
        if (c === "," && !inQ) {
          out.push(cur);
          cur = "";
          continue;
        }
        cur += c;
      }
      out.push(cur);
      return out;
    }

    function parseFriendsCSV(text) {
      const lines = text.trim().split(/\r?\n/).filter((l) => l.length > 0);
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]).map((h) => h.trim());
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cells = parseCSVRow(lines[i]);
        const o = {};
        headers.forEach((h, idx) => {
          o[h] = cells[idx] !== undefined ? String(cells[idx]).trim() : "";
        });
        rows.push({
          id: Number(o.id),
          name: o.name || "",
          lineName: o.lineName || "",
          age: Number(o.age),
          gender: o.gender || "",
          occupation: o.occupation || "",
          metDate: o.metDate || "",
          metPlace: o.metPlace || "",
          info: o.info || "",
          futurePlan: o.futurePlan || ""
        });
      }
      return rows;
    }

    /**
     * @param {File} [file] 省略時は friends.csv を fetch → 失敗時は HTML 同梱 CSV → 最後の手段で定数
     * @returns {Promise<object[]>}
     */
    async function loadFriendsFromCSV(file) {
      if (file && typeof file.text === "function") {
        return parseFriendsCSV(await file.text());
      }

      const csvUrl = new URL("friends.csv", window.location.href).href;
      try {
        const res = await fetch(csvUrl, { cache: "no-store" });
        if (res.ok) {
          const text = await res.text();
          const rows = parseFriendsCSV(text);
          if (rows.length) return rows;
        }
      } catch (_) {
        /* file:// やオフラインでは fetch が失敗する */
      }

      const embeddedEl = document.getElementById("embedded-friends-csv");
      if (embeddedEl) {
        const text = embeddedEl.textContent.trim();
        if (text) {
          const rows = parseFriendsCSV(text);
          if (rows.length) return rows;
        }
      }

      return parseFriendsCSV(FALLBACK_CSV);
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr.includes("T") ? dateStr : dateStr + "T12:00:00");
      if (Number.isNaN(d.getTime())) return dateStr;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}/${m}/${day}`;
    }

    function showScreen(screenId) {
      currentScreen = screenId;
      Object.entries(screens).forEach(([id, el]) => {
        const active = id === screenId;
        el.classList.toggle("is-active", active);
        el.setAttribute("aria-hidden", active ? "false" : "true");
      });
    }

    function goToMenu() {
      showScreen("menu");
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s == null ? "" : String(s);
      return div.innerHTML;
    }

    function renderFriendList() {
      friendListBody.innerHTML = "";
      friends.forEach((f) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(f.name)}</td>
          <td>${escapeHtml(f.lineName)}</td>
          <td>${escapeHtml(String(f.age))}</td>
          <td>${escapeHtml(f.gender)}</td>
          <td>${escapeHtml(f.occupation)}</td>
          <td><button type="button" class="btn btn-detail" data-friend-id="${f.id}">詳細</button></td>
        `;
        friendListBody.appendChild(tr);
      });
      friendListBody.querySelectorAll("[data-friend-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-friend-id"));
          showFriendDetail(id);
        });
      });
    }

    function showFriendDetail(friendId) {
      const friend = friends.find((x) => x.id === friendId);
      if (!friend) return;
      selectedFriend = friend;
      friendDetailContent.innerHTML = `
        <div class="detail-row"><dt>名前</dt><dd>${escapeHtml(friend.name)}</dd></div>
        <div class="detail-row"><dt>LINE名</dt><dd>${escapeHtml(friend.lineName)}</dd></div>
        <div class="detail-row"><dt>年齢</dt><dd>${escapeHtml(String(friend.age))}</dd></div>
        <div class="detail-row"><dt>性別</dt><dd>${escapeHtml(friend.gender)}</dd></div>
        <div class="detail-row"><dt>職業</dt><dd>${escapeHtml(friend.occupation)}</dd></div>
        <div class="detail-row"><dt>出会った日</dt><dd>${escapeHtml(formatDate(friend.metDate))}</dd></div>
        <div class="detail-row"><dt>出会った場所</dt><dd>${escapeHtml(friend.metPlace)}</dd></div>
        <div class="detail-row"><dt>相手の情報</dt><dd>${escapeHtml(friend.info)}</dd></div>
        <div class="detail-row"><dt>今後の予定</dt><dd>${escapeHtml(friend.futurePlan)}</dd></div>
      `;
      showScreen("friendDetail");
    }

    function renderMemoList() {
      memoListBody.innerHTML = "";
      memos.forEach((m) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(formatDate(m.date))}</td>
          <td>${escapeHtml(m.category)}</td>
          <td><button type="button" class="btn btn-detail" data-memo-id="${m.id}">詳細</button></td>
        `;
        memoListBody.appendChild(tr);
      });
      memoListBody.querySelectorAll("[data-memo-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.getAttribute("data-memo-id"));
          const memo = memos.find((x) => x.id === id);
          if (memo) {
            window.alert(`（将来実装）\n日付: ${formatDate(memo.date)}\n項目: ${memo.category}\n内容: ${memo.detail}`);
          }
        });
      });
    }

    function login() {
      loginError.textContent = "";
      const idInput = document.getElementById("login-id");
      const pwInput = document.getElementById("login-password");
      const id = idInput.value.trim();
      const password = pwInput.value;

      if (id === "" || password === "") {
        loginError.textContent = "IDとパスワードを入力してください";
        return;
      }

      if (id !== AUTH.id || password !== AUTH.password) {
        loginError.textContent = "IDまたはパスワードが正しくありません";
        return;
      }

      isLoggedIn = true;
      idInput.value = "";
      pwInput.value = "";
      goToMenu();
    }

    function logout() {
      isLoggedIn = false;
      selectedFriend = null;
      friends = [];
      loginError.textContent = "";
      friendLoadError.hidden = true;
      friendLoadError.textContent = "";
      showScreen("login");
    }

    document.querySelectorAll('[data-action="logout"]').forEach((el) => {
      el.addEventListener("click", () => logout());
    });

    document.querySelectorAll('[data-action="menu"]').forEach((el) => {
      el.addEventListener("click", () => goToMenu());
    });

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      login();
    });

    document.getElementById("btn-close-login").addEventListener("click", () => {
      loginError.textContent = "";
      document.getElementById("login-id").value = "";
      document.getElementById("login-password").value = "";
      try {
        window.close();
      } catch (_) {}
    });

    document.getElementById("link-friend-list").addEventListener("click", async () => {
      friendLoadError.hidden = true;
      friendLoadError.textContent = "";
      friends = await loadFriendsFromCSV();
      if (!friends.length) {
        friendLoadError.textContent = "友達データを読み込めませんでした。CSVファイルを指定してください。";
        friendLoadError.hidden = false;
      }
      renderFriendList();
      showScreen("friendList");
    });

    document.getElementById("csv-file-input").addEventListener("change", async (e) => {
      const f = e.target.files && e.target.files[0];
      e.target.value = "";
      if (!f) return;
      friendLoadError.hidden = true;
      friendLoadError.textContent = "";
      try {
        friends = await loadFriendsFromCSV(f);
        if (!friends.length) {
          friendLoadError.textContent = "CSVに有効な行がありません。";
          friendLoadError.hidden = false;
        }
      } catch (err) {
        friendLoadError.textContent = "CSVの読み込みに失敗しました。";
        friendLoadError.hidden = false;
      }
      renderFriendList();
    });

    document.getElementById("link-memo-list").addEventListener("click", () => {
      renderMemoList();
      showScreen("memoList");
    });

    showScreen("login");
  </script>
</body>
</html>
