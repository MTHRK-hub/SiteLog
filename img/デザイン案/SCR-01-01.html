<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>現場記録簿 - ログイン（デザイン案）</title>
  <link rel="stylesheet" href="SCR-01-01.css" />
</head>
<body class="login-page">

  <!-- スクリーン四隅のゴールド装飾 -->
  <div class="corner corner-tl" aria-hidden="true"></div>
  <div class="corner corner-tr" aria-hidden="true"></div>
  <div class="corner corner-bl" aria-hidden="true"></div>
  <div class="corner corner-br" aria-hidden="true"></div>

  <!-- 画面ID -->
  <span class="screen-id">SCR-01-01</span>

  <!-- アプリタイトル -->
  <h1 class="app-title">現場記録簿</h1>

  <!-- ログインカード -->
  <div class="login-card">
    <form id="login-form" novalidate>

      <div class="field">
        <label for="login-id">ID</label>
        <input id="login-id" name="id" type="text" autocomplete="username" />
      </div>

      <div class="field">
        <label for="login-password">パスワード</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" />
      </div>

      <div class="login-actions">
        <!-- ゴールドボタン：左右にギア装飾 -->
        <button type="submit" class="btn btn-login">
          <span class="gear" aria-hidden="true"></span>
          ログイン
          <span class="gear" aria-hidden="true"></span>
        </button>

        <button type="button" id="btn-close" class="btn btn-close-app">閉じる</button>
      </div>

    </form>
    <p id="login-error" class="error-msg" role="alert"></p>
  </div>

  <script src="SCR-01-01.js"></script>
</body>
</html>
